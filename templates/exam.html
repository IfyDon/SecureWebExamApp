<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Exam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #0A0F1E; font-family: Arial, sans-serif; overflow: hidden; height: 100vh; }
        .exam-container { display: flex; flex-direction: column; height: 100vh; }
        .top-bar {
            background: #0D2137; padding: 12px 24px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
        }
        .title { color: #F0C040; font-weight: bold; font-size: 1.2rem; }
        .student-info { color: #90B8D8; font-size: 0.9rem; }
        .timer { font-size: 1.8rem; font-weight: bold; color: #00FF88; font-family: monospace; }
        .progress { color: #A0C4E0; }
        .content { flex: 1; padding: 30px; overflow-y: auto; background: #0A0F1E; }
        .question-card {
            background: #0E2236; border: 2px solid #1A5080; border-radius: 16px;
            padding: 30px; max-width: 800px; margin: 0 auto;
        }
        .question-header {
            background: #1A5080; display: inline-block; padding: 6px 18px;
            border-radius: 20px; margin-bottom: 20px; font-weight: bold;
        }
        .question-text { font-size: 1.3rem; font-weight: bold; margin-bottom: 30px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            background: #122A42; padding: 12px 20px; border-radius: 10px;
            cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .option:hover { background: #1A3A55; transform: translateX(5px); }
        .option.selected { background: #1A5C8A; border-color: #4A90D9; }
        .nav-bar {
            background: #0D2137; padding: 15px 24px;
            display: flex; justify-content: space-between; gap: 12px;
        }
        .nav-bar button {
            padding: 10px 24px; font-size: 1rem; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
        }
        .nav-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
        #prevBtn { background: #1A3A5C; color: white; }
        #nextBtn { background: #1A5C3A; color: white; }
        #submitBtn { background: #8B0000; color: white; }
        .camera-overlay {
            position: fixed; bottom: 20px; right: 20px;
            width: 200px; height: 150px; border: 3px solid #F0C040;
            border-radius: 12px; overflow: hidden; background: black; z-index: 1000;
        }
        .camera-overlay video { width: 100%; height: 100%; object-fit: cover; }
        .camera-label {
            position: absolute; bottom: 5px; right: 8px;
            background: #F0C040; color: black; font-size: 10px;
            padding: 2px 8px; border-radius: 20px; font-weight: bold;
        }
    </style>
</head>
<body>
<div class="exam-container">
    <div class="top-bar">
        <div class="title">🔒 SECURE EXAMINATION</div>
        <div class="student-info" id="studentInfo"></div>
        <div class="timer" id="timer">⏱ 02:00</div>
        <div class="progress" id="progress">Q 1 / 5</div>
    </div>
    <div class="content">
        <div class="question-card">
            <div class="question-header" id="qHeader">QUESTION 1 OF 5</div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
        </div>
    </div>
    <div class="nav-bar">
        <button id="prevBtn" disabled>◀ Previous</button>
        <button id="nextBtn">Next ▶</button>
        <button id="submitBtn" class="submit">✅ SUBMIT EXAM</button>
    </div>
    <div class="camera-overlay">
        <video id="cameraVideo" autoplay muted playsinline></video>
        <div class="camera-label">📷 MONITORING</div>
    </div>
</div>
<script>
    // Questions passed from Flask (embedded in template)
    const questions = {{ questions | tojson }};
    let currentQ = 0;
    let answers = {};
    let timeLeft = 120;
    let timerInterval = null;
    let examEnded = false;
    let cameraStream = null;
    let focusActive = false;   // delay after fullscreen

    // DOM elements
    const studentInfo = document.getElementById('studentInfo');
    const timerDisplay = document.getElementById('timer');
    const progressDisplay = document.getElementById('progress');
    const qHeader = document.getElementById('qHeader');
    const questionText = document.getElementById('questionText');
    const optionsDiv = document.getElementById('optionsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitBtn');
    const cameraVideo = document.getElementById('cameraVideo');

    // Fetch student info from session
    fetch('/session_info')  // We'll add this route
        .then(res => res.json())
        .then(data => {
            studentInfo.textContent = `👤 ${data.name} | 🎓 ${data.cls} | 📋 ${data.reg}`;
        });

    // Security: disable right-click, copy, paste, Ctrl shortcuts
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('copy', e => e.preventDefault());
    document.addEventListener('cut', e => e.preventDefault());
    document.addEventListener('paste', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.ctrlKey || e.metaKey) { e.preventDefault(); return false; }
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) { e.preventDefault(); return false; }
    });

    // Fullscreen & tab detection
    function enterFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
    }
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && !examEnded && focusActive) {
            terminateExam('Fullscreen exited! Exam terminated.');
        }
    });
    let blurTimeout = null;
    window.addEventListener('blur', () => {
        if (!examEnded && focusActive) {
            blurTimeout = setTimeout(() => {
                if (!examEnded && focusActive) terminateExam('Tab switch detected! Exam terminated.');
            }, 200);
        }
    });
    window.addEventListener('focus', () => clearTimeout(blurTimeout));
    document.addEventListener('visibilitychange', () => {
        if (document.hidden && !examEnded && focusActive) {
            terminateExam('Tab switch detected! Exam terminated.');
        }
    });

    // Camera
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            cameraStream = stream;
            cameraVideo.srcObject = stream;
        } catch (err) {
            document.querySelector('.camera-label').innerHTML = '📷 No Camera';
        }
    }
    function stopCamera() {
        if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
    }

    // Timer
    function startTimer() {
        timerInterval = setInterval(() => {
            if (examEnded) return;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                submitExam(true);
            } else {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDisplay.textContent = `⏱ ${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                if (timeLeft <= 30) timerDisplay.style.color = '#FF4444';
            }
        }, 1000);
    }

    // Render question
    function renderQuestion() {
        const q = questions[currentQ];
        qHeader.textContent = `QUESTION ${currentQ+1} OF ${questions.length}`;
        progressDisplay.textContent = `Q ${currentQ+1} / ${questions.length}`;
        questionText.textContent = q.question;
        optionsDiv.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const letter = String.fromCharCode(65+idx);
            const div = document.createElement('div');
            div.className = 'option';
            div.textContent = opt;
            div.dataset.value = letter;
            if (answers[currentQ] === letter) div.classList.add('selected');
            div.addEventListener('click', () => {
                if (examEnded) return;
                document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                answers[currentQ] = letter;
            });
            optionsDiv.appendChild(div);
        });
        prevBtn.disabled = currentQ === 0;
        nextBtn.disabled = currentQ === questions.length - 1;
    }

    function nextQuestion() { if (!examEnded && currentQ < questions.length-1) { currentQ++; renderQuestion(); } }
    function prevQuestion() { if (!examEnded && currentQ > 0) { currentQ--; renderQuestion(); } }

    async function submitExam(timeout = false) {
        if (examEnded) return;
        if (!timeout && Object.keys(answers).length < questions.length) {
            if (!confirm(`You have ${questions.length - Object.keys(answers).length} unanswered question(s). Submit anyway?`)) return;
        }
        examEnded = true;
        focusActive = false;
        clearInterval(timerInterval);
        stopCamera();
        const response = await fetch('/submit_exam', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answers, timeout })
        });
        const result = await response.json();
        // Redirect to result page with query params
        window.location.href = `/result?score=${result.score}&total=${result.total}&passed=${result.passed}&timeout=${timeout}`;
    }

    function terminateExam(reason) {
        if (examEnded) return;
        examEnded = true;
        focusActive = false;
        clearInterval(timerInterval);
        stopCamera();
        alert(reason);
        // Optionally send termination to server
        fetch('/submit_exam', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answers, timeout: false, terminated: true, reason })
        }).then(() => window.location.href = '/');
    }

    // Initialize
    enterFullscreen();
    startCamera();
    renderQuestion();
    startTimer();
    setTimeout(() => { if (!examEnded) focusActive = true; }, 1000);

    prevBtn.addEventListener('click', prevQuestion);
    nextBtn.addEventListener('click', nextQuestion);
    submitBtn.addEventListener('click', () => submitExam(false));
</script>
</body>
</html>
