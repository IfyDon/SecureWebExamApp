<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Exam Portal – Registration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0D1B2A;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #0E2236;
            padding: 40px;
            border-radius: 16px;
            width: 500px;
            max-width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h1 { text-align: center; color: #F0C040; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #A0B8D0; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #C5D8E8; margin-bottom: 8px; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            background: #162C42;
            border: 2px solid #2A4A6A;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        .rules {
            background: #251800;
            padding: 15px;
            border-radius: 8px;
            margin: 25px 0;
            color: #FFA040;
            font-size: 13px;
            line-height: 1.5;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0F8A3C;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #12AA4A; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎓 SECURE EXAM PORTAL</h1>
        <p class="subtitle">Complete your registration to begin</p>
        <div class="form-group">
            <label>👤 Student Full Name</label>
            <input type="text" id="name" placeholder="e.g. John Adebayo">
        </div>
        <div class="form-group">
            <label>🎓 Class / Level</label>
            <input type="text" id="cls" placeholder="e.g. SS3 / 300L">
        </div>
        <div class="form-group">
            <label>📋 Registration No.</label>
            <input type="text" id="reg" placeholder="e.g. REG/2024/001">
        </div>
        <div class="rules">
            ⚠ EXAM RULES ⚠<br>
            • No tab switching or window changes<br>
            • No right-click functionality<br>
            • No copy/paste or keyboard shortcuts<br>
            • Camera monitoring active throughout<br>
            • 2-minute timer for all questions<br>
            • Any violation will end the exam immediately
        </div>
        <button id="startBtn">▶ START EXAMINATION ▶</button>
    </div>
    <script>
        document.getElementById('startBtn').addEventListener('click', async () => {
            const name = document.getElementById('name').value.trim();
            const cls = document.getElementById('cls').value.trim();
            const reg = document.getElementById('reg').value.trim();
            if (!name || !cls || !reg) {
                alert('Please fill all fields');
                return;
            }
            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, cls, reg })
            });
            if (res.ok) {
                window.location.href = '/exam';
            } else {
                alert('Registration failed');
            }
        });
    </script>
</body>
</html>
